apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kp-kuberport-postgres
  labels:
    helm.sh/chart: kuberport-0.1.0
    app.kubernetes.io/name: kuberport
    app.kubernetes.io/instance: kp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: postgres
spec:
  serviceName: kp-kuberport-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuberport
      app.kubernetes.io/instance: kp
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        helm.sh/chart: kuberport-0.1.0
        app.kubernetes.io/name: kuberport
        app.kubernetes.io/instance: kp
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        # postgres image runs as uid 999 (postgres). fsGroup so it can write
        # the mounted PVC.
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: kp-kuberport-postgres
          env:
            # PGDATA cannot be the mount root — pg refuses to init on top of
            # the lost+found directory created by some PVC provisioners.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1'
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1'
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          helm.sh/chart: kuberport-0.1.0
          app.kubernetes.io/name: kuberport
          app.kubernetes.io/instance: kp
          app.kubernetes.io/version: "0.1.0"
          app.kubernetes.io/managed-by: Helm
          app.kubernetes.io/component: postgres
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "standard"
        resources:
          requests:
            storage: "10Gi"
