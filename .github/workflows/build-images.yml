name: build-images

# Multi-arch (linux/amd64 + linux/arm64) Docker images for backend + frontend.
# Pushed to ghcr.io/shyuni4u/kuberport-backend and -frontend.
# See ADR 0003 §"공통 스택" — multi-arch is required for Phase 1↔2/3 zero-touch
# (x86 GCP bootstrap → ARM OCI/Hetzner production without rebuild).

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-images.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # ghcr.io push 권한

env:
  REGISTRY: ghcr.io
  # Lowercase owner for OCI image names. github.repository_owner can be mixed case;
  # we hardcode here since registry refs must be lowercase.
  IMAGE_NAMESPACE: shyuni4u

jobs:
  build:
    name: ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./backend
          - component: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation when needed)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # PR from forks 는 GITHUB_TOKEN 으로 push 권한 없음 — push 단계 자체를 건너뜀
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/kuberport-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          # PR 은 build only (push 안 함, ghcr 권한 없음)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache — backend/frontend 별로 분리해서 cross-pollination 방지
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
          # Provenance/SBOM 생성은 CD 단순화 위해 일단 끔 (필요 시 켜기)
          provenance: false
          build-args: |
            VERSION=${{ github.ref_name }}-${{ github.sha }}
