apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kuberport.frontend.fullname" . }}
  labels:
    {{- include "kuberport.frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "kuberport.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kuberport.frontend.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/frontend-configmap.yaml") . | sha256sum }}
        {{- if .Values.auth.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Frontend reads/writes the same DB as backend. Wait until the backend
      # Service is responding /healthz — that signals migrations have been
      # applied and the schema is current.
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              until wget -q -O - --timeout=2 http://{{ include "kuberport.backend.fullname" . }}:{{ .Values.backend.service.port }}/healthz >/dev/null; do
                echo "waiting for backend..."
                sleep 3
              done
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      containers:
        - name: frontend
          image: {{ include "kuberport.frontend.image" . }}
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kuberport.frontend.fullname" . }}
            - secretRef:
                name: {{ include "kuberport.auth.secretName" . }}
          # Frontend has no dedicated health endpoint; "/" returns 200 once
          # Next.js is ready (and 307 to a login redirect counts as healthy
          # under the default kubelet HTTP probe acceptance range 200–399).
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Next.js standalone server writes traces / temp files under /app/.next/cache.
            - name: nextcache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextcache
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
