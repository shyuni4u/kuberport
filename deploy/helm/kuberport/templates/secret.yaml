{{- if .Values.auth.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kuberport.auth.secretName" . }}
  labels:
    {{- include "kuberport.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "kuberport.databaseUrl" . | quote }}
  APP_ENCRYPTION_KEY_B64: {{ required "auth.appEncryptionKeyB64 is required when auth.create=true" .Values.auth.appEncryptionKeyB64 | quote }}
  OIDC_CLIENT_SECRET: {{ required "auth.oidcClientSecret is required when auth.create=true" .Values.auth.oidcClientSecret | quote }}
{{- end -}}
