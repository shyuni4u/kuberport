# Source: kuberport/templates/frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kp-kuberport-frontend
  labels:
    helm.sh/chart: kuberport-0.1.0
    app.kubernetes.io/name: kuberport
    app.kubernetes.io/instance: kp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuberport
      app.kubernetes.io/instance: kp
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        helm.sh/chart: kuberport-0.1.0
        app.kubernetes.io/name: kuberport
        app.kubernetes.io/instance: kp
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: frontend
      annotations:
        checksum/config: c14e23194ab26b96ed0e0d6277f162ccee075a19dd465f20319bfafcf992fdb9
        checksum/secret: 643855a093a177e4e8ec7f294fa32bd14f58fd242ae7e0909ac7e9dc02671f23
    spec:
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      # Frontend reads/writes the same DB as backend. Wait until the backend
      # Service is responding /healthz — that signals migrations have been
      # applied and the schema is current.
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              until wget -q -O - --timeout=2 http://kp-kuberport-backend:8080/healthz >/dev/null; do
                echo "waiting for backend..."
                sleep 3
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
      containers:
        - name: frontend
          image: ghcr.io/shyuni4u/kuberport-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kp-kuberport-frontend
            - secretRef:
                name: kp-kuberport-auth
          # Frontend has no dedicated health endpoint; "/" returns 200 once
          # Next.js is ready (and 307 to a login redirect counts as healthy
          # under the default kubelet HTTP probe acceptance range 200–399).
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: 500m
              memory: 384Mi
            requests:
              cpu: 50m
              memory: 96Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Next.js standalone server writes traces / temp files under /app/.next/cache.
            - name: nextcache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextcache
          emptyDir: {}
