{{- if .Values.postgres.embedded -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kuberport.postgres.fullname" . }}
  labels:
    {{- include "kuberport.postgres.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ required "postgres.password is required when postgres.embedded=true" .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
{{- end -}}
