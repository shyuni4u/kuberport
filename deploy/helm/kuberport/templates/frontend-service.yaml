apiVersion: v1
kind: Service
metadata:
  name: {{ include "kuberport.frontend.fullname" . }}
  labels:
    {{- include "kuberport.frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "kuberport.frontend.selectorLabels" . | nindent 4 }}
