    app.kubernetes.io/instance: kp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  secretName: "kp-kuberport-tls"
  dnsNames:
    - "kp.test.local"
  issuerRef:
    kind: "ClusterIssuer"
