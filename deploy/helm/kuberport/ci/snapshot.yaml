# Source: kuberport/templates/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kp-kuberport-backend
  labels:
    helm.sh/chart: kuberport-0.1.0
    app.kubernetes.io/name: kuberport
    app.kubernetes.io/instance: kp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuberport
      app.kubernetes.io/instance: kp
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        helm.sh/chart: kuberport-0.1.0
        app.kubernetes.io/name: kuberport
        app.kubernetes.io/instance: kp
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: backend
      annotations:
        # Roll the Pod when ConfigMap or Secret content changes.
        checksum/config: f20a4127b94c6b396498cc5de9356087701889c72e7a4b3e9ec72dade8162aff
        # schema.hcl 변경 시 backend pod 가 재시작되며 atlas initContainer
        # 가 새 스키마를 적용. 이 어노테이션이 없으면 migration ConfigMap
        # 갱신만으로는 Deployment template 해시가 안 바뀌어 롤이 안 됨.
        checksum/migration: 352df8b600ee6da59844eba29d4c83d1481cfae518220f79ff56d0fbc053e0f9
        checksum/secret: 643855a093a177e4e8ec7f294fa32bd14f58fd242ae7e0909ac7e9dc02671f23
    spec:
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      # Migration runs as initContainers (not a Helm hook) so that fresh
      # `helm install` works with embedded Postgres — at pre-install hook time
      # the Postgres StatefulSet/Service don't exist yet, so a hook Job can't
      # reach the DB. Atlas schema apply is idempotent; the cost of re-running
      # on each backend pod restart is a few seconds.
      initContainers:
        # Only meaningful for embedded Postgres (in-chart Service). External
        # Postgres is the operator's responsibility to keep reachable; the
        # `migrate` container's own Pod-level restartPolicy retries it on
        # transient connection failure.
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              # Block until Postgres TCP port is open. Avoids atlas's
              # immediate DNS-resolution failure on first install.
              until nc -z kp-kuberport-postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
        - name: migrate
          image: "arigaio/atlas:0.30.0"
          workingDir: /migrations
          # ENTRYPOINT ["atlas"] — use args, not command.
          args:
            - schema
            - apply
            - --env
            - prod
            - --auto-approve
          env:
            - name: DATABASE_URL
              value: "postgres://kuberport:golden-snapshot-pgpass@kp-kuberport-postgres:5432/kuberport?sslmode=disable"
          volumeMounts:
            - name: migration-files
              mountPath: /migrations
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
      containers:
        - name: backend
          image: ghcr.io/shyuni4u/kuberport-backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kp-kuberport-backend
            - secretRef:
                name: kp-kuberport-auth
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: migration-files
          configMap:
            name: kp-kuberport-migrate-files
