# Source: kuberport/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kp-kuberport
  labels:
    helm.sh/chart: kuberport-0.1.0
    app.kubernetes.io/name: kuberport
    app.kubernetes.io/instance: kp
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  ingressClassName: "traefik"
  tls:
    - hosts:
        - "kp.test.local"
      secretName: "kp-kuberport-tls"
  rules:
    - host: "kp.test.local"
      http:
        paths:
          # All external traffic goes to the frontend BFF.
          # The Go backend stays on its in-cluster Service only —
          # frontend Route Handlers proxy to it server-side.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kp-kuberport-frontend
                port:
                  number: 3000
